workflows:
  react-native-android:
    name: Momo Assistant APK Build
    max_build_duration: 15
    instance_type: mac_mini_m1
    environment:
      node: latest
      java: 17
    scripts:
      - name: Install dependencies
        script: | 
          npm install
      - name: Create App Config and Generate Android Folder
        script: |
          cat << 'EOF' > app.json
          {
            "expo": {
              "name": "Momo Assistant",
              "slug": "momo-assistant",
              "version": "1.0.0",
              "android": {
                "package": "com.momo.assistant"
              }
            }
          }
          EOF
          npx expo prebuild --platform android --no-install
          npm install
      - name: Build Android APK
        script: | 
          cd android && chmod +x gradlew && ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
